<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>景点详情 - 景点推荐探索器</title>
    <link rel="stylesheet" href="css/attraction.css" />
  </head>
  <body>
    <!-- 返回按钮 -->
    <a href="index.html" class="back-btn">← 返回主页面</a>

    <main class="attraction-container">
      <!-- 景点标题（动态加载） -->
      <h1 id="attraction-title" class="attraction-title">景点名称</h1>

      <!-- 基本信息卡片 -->
      <div class="basic-info-card">
        <h3>基本信息</h3>
        <div class="info-grid">
          <div class="info-item">
            <span class="info-label">📍 位置：</span>
            <span id="info-location" class="info-value">加载中...</span>
          </div>
          <div class="info-item">
            <span class="info-label">🕒 开放时间：</span>
            <span id="info-openTime" class="info-value">加载中...</span>
          </div>
          <div class="info-item">
            <span class="info-label">🎫 门票：</span>
            <span id="info-ticket" class="info-value">加载中...</span>
          </div>
          <div class="info-item">
            <span class="info-label">🌸 最佳季节：</span>
            <span id="info-bestSeason" class="info-value">加载中...</span>
          </div>
        </div>
      </div>

      <!-- 主场景部分 -->
      <section class="main-scene">
        <h2></h2>

        <!-- 主场景图片容器 -->
        <div class="main-scene-img-container">
          <!-- 注意：这里图片的src是空的，将通过JavaScript动态设置 -->
          <img
            id="main-scene-img"
            src=""
            alt="主场景图片"
            class="main-scene-img"
          />
          <div class="image-placeholder" id="main-image-placeholder">
            主场景图片加载中...
          </div>
        </div>

        <!-- 主场景简介 -->
        <div class="main-scene-desc">
          <!-- 注意：这里的文字将通过JavaScript动态设置 -->
          <p id="main-scene-desc">主场景描述加载中...</p>
        </div>
      </section>

      <!-- 副场景部分 -->
      <section class="sub-scenes">
        <h2></h2>
        <div class="sub-scenes-container" id="sub-scenes-container">
          <!-- 这里的内容将通过JavaScript动态生成 -->
          <!-- 示例结构（会被JavaScript替换） -->
          <div class="sub-scene-item">
            <div class="sub-scene-img-container">
              <img src="" alt="副场景1" class="sub-scene-img" />
              <div class="image-placeholder">副场景图片1</div>
            </div>
            <div class="sub-scene-desc">
              <p>副场景1描述</p>
            </div>
          </div>
        </div>
      </section>

     

    <!-- 引入必要的JavaScript文件 -->
    <script src="js/data.js"></script>
    <!-- 必须先引入数据 -->
    <script src="js/attraction.js"></script>
    <!-- 再引入逻辑 -->
  </body>
</html>
